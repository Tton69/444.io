<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>444</title>

<!-- ==================== СТИЛИ ==================== -->
<style>
    /* ---------- Общие стили ---------- */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
                     "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        /* Холодный меняющийся градиент фона */
        background: linear-gradient(135deg,
                    #0d1b2a,   /* очень тёмно‑синий */
                    #1b263b,   /* темно‑голубой */
                    #415a77,   /* стальной синий */
                    #778da9,   /* серо‑голубой */
                    #e0fbfc);  /* почти прозрачный голубой */
        background-size: 400% 400%;
        animation: bgShift 30s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Анимация плавного перемещения градиента */
    @keyframes bgShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* ---------- Текст ---------- */
    .title {
        font-size: clamp(4rem, 20vw, 12rem);   /* крупный, адаптивный размер */
        font-weight: 800;
        text-align: center;
        position: relative;
        line-height: 1;
    }

    .title span {
        /* Синий‑голубой градиент внутри текста */
        background: linear-gradient(60deg,
                     #e0fbfc,   /* почти белый голубой */
                     #a5d8ff,   /* светло‑голубой */
                     #69c0ff);  /* ярко‑голубой */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 2.8s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from { filter: brightness(1); }
        to   { filter: brightness(1.6); }
    }

    /* ---------- Плавающие кружки ---------- */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,.08);   /* по умолчанию — почти прозрачный белый */
        pointer-events: none;
        animation: float 12s linear infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0);
            opacity: 0;
        }
        10% { opacity: 0.3; }
        30% { opacity: 0.6; }
        100% {
            transform: translateY(-10vh) scale(1.4);
            opacity: 0;
        }
    }
</style>
</head>

<body>
    <div class="title"><span>444</span></div>

    <!-- ============= СКРИПТ ДЛЯ КРУЖКОВ ============= -->
    <script>
        /* Холодные оттенки для кружков */
        const CIRCLE_COLORS = [
            'rgba(173,216,230,.12)',   // lightblue
            'rgba(0,191,255,.15)',     // deepskyblue
            'rgba(176,224,230,.08)'    // powderblue
        ];
        const NUM_CIRCLES = 30;   // количество кружков

        for (let i = 0; i < NUM_CIRCLES; i++) {
            const el = document.createElement('div');
            el.classList.add('circle');

            // случайный размер 30‑120 px
            const size = Math.random() * 90 + 30;
            el.style.width = el.style.height = `${size}px`;

            // случайное горизонтальное положение
            el.style.left = Math.random() * 100 + 'vw';

            // случайный цвет из палитры
            el.style.background = CIRCLE_COLORS[
                Math.floor(Math.random() * CIRCLE_COLORS.length)
            ];

            // разброс задержек и длительностей, чтобы движение выглядело естественно
            const delay = Math.random() * -12;           // отрицательная задержка “запускает” анимацию в середине цикла
            const duration = 10 + Math.random() * 8;    // 10‑18 сек.
            el.style.animationDelay = `${delay}s`;
            el.style.animationDuration = `${duration}s`;

            document.body.appendChild(el);
        }
    </script>
</body>
</html>
