<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>444</title>

<style>
    /* ---------- Общие стили ---------- */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
                     "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        /* Очень холодный градиент, медленно меняющийся */
        background: linear-gradient(135deg,
            #0a0f2b,
            #0d1e36,
            #172a44,
            #2b4f71,
            #60c5ff);
        background-size: 400% 400%;
        animation: bgShift 45s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    @keyframes bgShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* ---------- Центрированный заголовок ---------- */
    .title {
        font-size: clamp(4rem, 20vw, 12rem);
        font-weight: 800;
        line-height: 1;
        position: relative;   /* нужен для z‑index */
        z-index: 2;           /* выше фоновых слоёв */
    }
    .title span {
        background: linear-gradient(60deg,
                        #e0ffff,   /* лёгкий бирюзовый */
                        #66dfff,
                        #00bfff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
        from { filter: brightness(1); }
        to   { filter: brightness(1.6); }
    }

    /* ---------- Туман из повторяющегося текста ----------
       Позиция – за кадром, анимация – медленное вертикальное смещение */
    .bg-text {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: -1;               /* самый «фоновый» слой */
        animation: drift 120s linear infinite;
    }
    @keyframes drift {
        0%   { transform: translateY(0); }
        100% { transform: translateY(-50%); }  /* смещение на половину высоты */
    }
    .bg-line {
        font-size: 1.4rem;
        line-height: 1.6;
        color: rgba(0, 200, 255, 0.07);   /* почти прозрачный холодный голубой */
        white-space: nowrap;
        overflow: hidden;
        margin: 0;
    }

    /* ---------- Плавающие кружки ---------- */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,.07);   /* лёгкая «молочно‑белая» дымка */
        pointer-events: none;
        animation: float 12s linear infinite;
        z-index: 0;              /* под заголовком, но поверх туманного текста */
    }
    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0);
            opacity: 0;
        }
        10% { opacity: 0.3; }
        30% { opacity: 0.6; }
        100% {
            transform: translateY(-10vh) scale(1.4);
            opacity: 0;
        }
    }
</style>
</head>

<body>
    <!-- Фоновый слой с повторяющимся текстом -->
    <div class="bg-text"></div>

    <!-- Центральный заголовок -->
    <div class="title"><span>444</span></div>

    <script>
        /* ====================== ТУМАННЫЙ ТЕКСТ ====================== */
        const bg = document.querySelector('.bg-text');
        const phrase = ' night and fog 444   ';   // пробелы для разделения
        const linesCount = 48;                  // сколько строк вертикально
        for (let i = 0; i < linesCount; i++) {
            const line = document.createElement('div');
            line.className = 'bg-line';
            // Достаточно повторить, чтобы строка превысила ширину экрана
            line.textContent = phrase.repeat(30);
            bg.appendChild(line);
        }

        /* ====================== ПЛАВАЮЩИЕ КРУЖКИ ====================== */
        const CIRCLE_COLORS = [
            'rgba(0,191,255,.12)',   // deep‑sky‑blue
            'rgba(173,216,230,.10)', // light‑blue
            'rgba(255,255,255,.07)'  // почти прозрачный белый
        ];
        const NUM_CIRCLES = 30;
        for (let i = 0; i < NUM_CIRCLES; i++) {
            const c = document.createElement('div');
            c.classList.add('circle');

            // случайный размер 30‑110 px
            const size = Math.random() * 80 + 30;
            c.style.width = c.style.height = `${size}px`;

            // случайное горизонтальное положение
            c.style.left = Math.random() * 100 + 'vw';

            // случайный цвет из палитры
            c.style.background = CIRCLE_COLORS[
                Math.floor(Math.random() * CIRCLE_COLORS.length)
            ];

            // разброс задержек и длительностей – естественное движение
            const delay = Math.random() * -12;          // отрицательная задержка «запускает» анимацию не с нуля
            const duration = 10 + Math.random() * 8;     // 10‑18 сек.
            c.style.animationDelay = `${delay}s`;
            c.style.animationDuration = `${duration}s`;

            document.body.appendChild(c);
        }
    </script>
</body>
</html>
