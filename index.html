<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Все бело‑голубым 444</title>

<!-- ==== Стили ==== -->
<style>
    /* ---------- Общие параметры ---------- */
    html,body {
        margin:0;
        padding:0;
        height:100%;
        overflow:hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg,#001e3c,#031d4c,#0e3b71,#3d8eb9,#6dd5fa,#ffffff);
        background-size: 400% 400%;
        animation: bgShift 30s ease infinite;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    /* ---------- Анимация фонового градиента ---------- */
    @keyframes bgShift {
        0%   {background-position:0% 50%;}
        50%  {background-position:100% 50%;}
        100% {background-position:0% 50%;}
    }

    /* ---------- Текст ---------- */
    .title {
        font-size: clamp(2.5rem, 8vw, 6rem);   /* адаптивный размер */
        font-weight: 700;
        text-align:center;
        color:#fff;
        position:relative;
        overflow:hidden;       /* нужно для "typewriter"-эффекта (если нужен) */
    }

    /* Текст‑градиент */
    .title span {
        background: linear-gradient(60deg, #ffffff, #00bfff, #e0f7ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 2.8s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from {filter:brightness(1);}
        to   {filter:brightness(1.6);}
    }

    /* ---------- Плавно мерцающая точка‑курсор (по желанию) ----------
       Если хотите подействовать как печатная машинка — раскомментируйте
       соответствующие правила ниже и удалите параметры overflow:hidden у .title. */
    /*
    .title::after{
        content:'';
        position:absolute;
        right:-0.1em; top:0;
        width:0.1em; height:1.1em;
        background:#fff;
        animation:blink .8s steps(2) infinite,
                   cursorMove 5s steps(30) forwards;
    }
    @keyframes blink{
        0%,50%{opacity:0;}
        51%,100%{opacity:1;}
    }
    @keyframes cursorMove{
        from{width:0;}
        to{width:100%;}
    }
    */

    /* ---------- Плавающие кружки ---------- */
    .circle{
        position:absolute;
        border-radius:50%;
        background:rgba(255,255,255,.12);
        pointer-events:none;  /* не мешать кликам */
        animation: float 12s linear infinite;
        /* небольшие различия в размере/скорости задаются скриптом */
    }
    @keyframes float{
        0%{
            transform:translateY(100vh) scale(0);
            opacity:0;
        }
        10%{opacity:0.3;}
        30%{opacity:0.6;}
        100%{
            transform:translateY(-10vh) scale(1.4);
            opacity:0;
        }
    }
</style>
</head>

<body>
    <div class="title"><span>все бело голубым 444</span></div>

    <!-- ==== Скрипт‑генератор плавающих кружков ==== -->
    <script>
        const COLORS = [
            'rgba(255,255,255,.12)',
            'rgba(0,191,255,.15)',
            'rgba(255,255,255,.08)'
        ];
        const NUM = 30;               // сколько кружков будет на экране
        const container = document.body; // куда вставляем

        for(let i=0;i<NUM;i++){
            const el = document.createElement('div');
            el.classList.add('circle');

            // случайный размер 20‑100 px
            const size = Math.random()*80 + 20;
            el.style.width = el.style.height = `${size}px`;

            // случайное горизонтальное положение
            el.style.left = Math.random()*100 + 'vw';

            // случайный цвет из набора
            el.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];

            // разные задержки и скорости, чтобы движение выглядело естественно
            const delay = Math.random()* -12;  // отрицательная задержка «запускает» анимацию в середине цикла
            const dur   = 10 + Math.random()*8; // 10‑18 сек.

            el.style.animationDelay    = `${delay}s`;
            el.style.animationDuration = `${dur}s`;

            container.appendChild(el);
        }
    </script>
</body>
</html>
